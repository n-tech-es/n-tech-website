<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Tech Solar Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo { font-size: 1rem; font-weight: 700; color: #f5a623; }
    .logo span { color: #e8e8e8; font-weight: 400; font-size: 0.82rem; }
    .mode-label { font-size: 0.72rem; color: #f5a623; text-transform: uppercase; letter-spacing: 0.05em; }
    .header-controls { display: flex; gap: 8px; align-items: center; }

    select, button.btn-sm {
      background: #2a2d3a;
      color: #e8e8e8;
      border: 1px solid #3a3d4a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    button.btn-sm:hover { background: #3a3d4a; }
    button.btn-pages { color: #f5a623; border-color: #f5a623; }

    /* Page picker modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 480px;
      max-height: 80dvh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal h3 { color: #f5a623; font-size: 1rem; }
    .pages-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .page-item {
      background: #2a2d3a;
      border: 1px solid #3a3d4a;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .page-item:hover { background: #3a3d4a; border-color: #f5a623; }
    .modal-close {
      background: transparent;
      border: 1px solid #3a3d4a;
      color: #888;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      align-self: flex-end;
    }

    /* Active page banner */
    .page-banner {
      display: none;
      background: #1e2a1a;
      border-bottom: 1px solid #2d4a2a;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #7bc47a;
      align-items: center;
      gap: 10px;
    }
    .page-banner.visible { display: flex; }
    .page-banner button {
      background: transparent;
      border: none;
      color: #f5a623;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user {
      background: #f5a623;
      color: #0f1117;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .msg.agent {
      background: #1e2130;
      color: #e8e8e8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2d3a;
    }
    .msg.agent.thinking { color: #666; font-style: italic; }
    /* Markdown rendering styles */
    .msg.agent h1, .msg.agent h2, .msg.agent h3, .msg.agent h4 {
      color: #f5a623; margin: 0.8em 0 0.4em; font-size: 1em; font-weight: 700;
    }
    .msg.agent h1 { font-size: 1.1em; }
    .msg.agent h2 { font-size: 1.05em; }
    .msg.agent p { margin: 0.4em 0; }
    .msg.agent ul, .msg.agent ol { padding-left: 1.4em; margin: 0.4em 0; }
    .msg.agent li { margin: 0.2em 0; }
    .msg.agent strong { color: #fff; }
    .msg.agent em { color: #bbb; }
    .msg.agent code {
      background: #2a2d3a; padding: 1px 5px; border-radius: 4px;
      font-family: monospace; font-size: 0.85em;
    }
    .msg.agent pre {
      background: #2a2d3a; padding: 10px; border-radius: 6px;
      overflow-x: auto; margin: 0.6em 0;
    }
    .msg.agent pre code { background: none; padding: 0; }
    .msg.agent blockquote {
      border-left: 3px solid #f5a623; padding-left: 10px;
      color: #aaa; margin: 0.4em 0;
    }
    .msg.agent a { color: #f5a623; }
    .msg.agent hr { border-color: #2a2d3a; margin: 0.8em 0; }
    .msg.system-msg {
      background: transparent;
      color: #555;
      font-size: 0.78rem;
      align-self: center;
      border: none;
      padding: 4px;
    }

    footer {
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      background: #2a2d3a;
      color: #e8e8e8;
      border: 1px solid #3a3d4a;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
    }
    #input:focus { border-color: #f5a623; }

    #send {
      background: #f5a623;
      color: #0f1117;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-end;
    }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #send:hover:not(:disabled) { background: #e09610; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">N-Tech Solar Agent <span>— N-Tech Energy Solutions</span></div>
    <div class="mode-label" id="mode-label">General Assistant</div>
  </div>
  <div class="header-controls">
    <button class="btn-sm btn-pages" onclick="openPages()">Pages</button>
    <select id="mode">
      <option value="chat">General Chat</option>
      <option value="technical">Technical</option>
      <option value="content">Content Writer</option>
      <option value="marketing">Marketing</option>
      <option value="research">Research</option>
      <option value="website">Website Reviewer</option>
    </select>
  </div>
</header>

<div class="page-banner" id="page-banner">
  <span>Reviewing: <strong id="banner-filename"></strong></span>
  <button onclick="clearPage()">✕ Clear</button>
</div>

<div id="messages">
  <div class="msg system-msg">Ask anything about solar, or click Pages to load a page for review.</div>
</div>

<footer>
  <textarea id="input" placeholder="Ask something..." rows="1"></textarea>
  <button id="send">Send</button>
</footer>

<!-- Pages Modal -->
<div class="modal-backdrop" id="modal" onclick="closePages(event)">
  <div class="modal">
    <h3>Select a Page to Review</h3>
    <div class="pages-list" id="pages-list">
      <div style="color:#666;font-size:0.85rem;">Loading...</div>
    </div>
    <button class="modal-close" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const modeEl = document.getElementById('mode');
  const modeLabelEl = document.getElementById('mode-label');
  const pageBanner = document.getElementById('page-banner');
  const bannerFilename = document.getElementById('banner-filename');

  const modeNames = {
    chat: 'General Assistant', technical: 'Technical Mode',
    content: 'Content Writer', marketing: 'Marketing Insights',
    research: 'Research Mode', website: 'Website Reviewer',
  };

  let history = [];
  let activePage = null;

  modeEl.addEventListener('change', () => {
    modeLabelEl.textContent = modeNames[modeEl.value] || modeEl.value;
    history = [];
    addMsg('system-msg', `Switched to ${modeNames[modeEl.value]} — history cleared`);
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  sendBtn.addEventListener('click', send);

  const SEARCH_TRIGGERS = [
    'recent','news','latest','current','today','this year',
    '2025','2026','tariff','policy','regulation','incentive',
    'price','cost','market','update','change','new',
  ];

  function addMsg(type, text) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function renderMarkdown(el, text) {
    if (typeof marked !== 'undefined') {
      el.innerHTML = marked.parse(text);
    } else {
      el.textContent = text;
    }
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    const mode = modeEl.value;
    const willSearch = mode === 'research' || SEARCH_TRIGGERS.some(t => text.toLowerCase().includes(t));
    const agentDiv = addMsg('agent thinking', willSearch ? 'Searching the web…' : 'Thinking…');

    try {
      const body = { messages: history, mode };
      if (activePage) {
        body.page_content = activePage.content;
        body.page_name = activePage.name;
      }

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) { agentDiv.textContent = 'Error: ' + res.statusText; agentDiv.className = 'msg agent'; return; }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      agentDiv.innerHTML = '';
      agentDiv.className = 'msg agent';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              renderMarkdown(agentDiv, fullText);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: fullText });

    } catch (err) {
      agentDiv.textContent = 'Connection error. Please try again.';
      agentDiv.className = 'msg agent';
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ─── Pages Modal ─────────────────────────────────────────

  async function openPages() {
    document.getElementById('modal').classList.add('open');
    const list = document.getElementById('pages-list');
    list.innerHTML = '<div style="color:#666;font-size:0.85rem;">Loading...</div>';
    try {
      const res = await fetch('/api/pages');
      const pages = await res.json();
      list.innerHTML = '';
      for (const page of pages) {
        const div = document.createElement('div');
        div.className = 'page-item';
        div.textContent = page;
        div.onclick = () => loadPage(page);
        list.appendChild(div);
      }
    } catch {
      list.innerHTML = '<div style="color:#f55;font-size:0.85rem;">Failed to load pages</div>';
    }
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  function closePages(e) { if (e.target === document.getElementById('modal')) closeModal(); }

  async function loadPage(filename) {
    closeModal();
    addMsg('system-msg', `Loading ${filename}…`);
    try {
      const res = await fetch(`/api/file?name=${encodeURIComponent(filename)}`);
      const data = await res.json();
      if (data.error) { addMsg('system-msg', `Error: ${data.error}`); return; }

      activePage = { name: filename, content: data.content };
      bannerFilename.textContent = filename;
      pageBanner.classList.add('visible');
      modeEl.value = 'website';
      modeLabelEl.textContent = modeNames['website'];
      history = [];

      addMsg('system-msg', `✓ ${filename} loaded — ask the agent what to review or improve`);
      inputEl.placeholder = `Ask about ${filename}…`;
      inputEl.focus();
    } catch {
      addMsg('system-msg', 'Failed to load page');
    }
  }

  function clearPage() {
    activePage = null;
    pageBanner.classList.remove('visible');
    bannerFilename.textContent = '';
    inputEl.placeholder = 'Ask something…';
    history = [];
    addMsg('system-msg', 'Page cleared — history reset');
  }
</script>
</body>
</html>
