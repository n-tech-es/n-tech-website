<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100" viewBox="0 0 160 100">
  <!-- Background -->
  <rect width="160" height="100" rx="8" fill="#1a2332"/>
  <!-- Top border accent -->
  <rect width="160" height="4" rx="2" fill="#52B788"/>
  <!-- Seal circle -->
  <circle cx="80" cy="42" r="26" fill="none" stroke="#52B788" stroke-width="2"/>
  <circle cx="80" cy="42" r="20" fill="#52B788" opacity="0.15"/>
  <!-- Star burst lines -->
  <g stroke="#52B788" stroke-width="1" opacity="0.6">
    <line x1="80" y1="13" x2="80" y2="18"/>
    <line x1="80" y1="66" x2="80" y2="71"/>
    <line x1="51" y1="42" x2="56" y2="42"/>
    <line x1="104" y1="42" x2="109" y2="42"/>
    <line x1="60" y1="22" x2="63.5" y2="25.5"/>
    <line x1="96.5" y1="58.5" x2="100" y2="62"/>
    <line x1="100" y1="22" x2="96.5" y2="25.5"/>
    <line x1="63.5" y1="58.5" x2="60" y2="62"/>
  </g>
  <!-- CoC text in seal -->
  <text x="80" y="38" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="11" fill="#52B788">CoC</text>
  <text x="80" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="white" opacity="0.8">MEMBER</text>
  <!-- Bottom text -->
  <text x="80" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="white" letter-spacing="1">CHAMBER OF COMMERCE</text>
  <text x="80" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#52B788">Verified Member</text>
</svg>
